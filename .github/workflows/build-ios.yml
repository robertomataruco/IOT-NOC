name: Build iOS App

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Permite rodar manualmente a partir do GitHub

jobs:
  build-ios:
    name: Build and Package iOS IPA
    runs-on: macos-15 # macOS 15 com suporte nativo a Xcode 16 e ferramentas atualizadas

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Capacitor 8+ requer Node 22+ ou superior
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Sync Capacitor iOS
        run: npx cap sync ios
        env:
          DEBUG: 'capacitor:*'

      - name: Build Xcode Project (Unsigned for iOS Device)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean build
        shell: bash

      - name: Package IPA (Payload structure)
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r App.ipa Payload
        shell: bash

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOC-Portal-Zabbix-Unsigned
          path: App.ipa
          retention-days: 7
