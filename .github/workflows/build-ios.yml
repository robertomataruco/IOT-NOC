name: Build iOS App

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Permite rodar manualmente a partir do GitHub

jobs:
  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-15 # macOS 15 com suporte nativo a Xcode 16 e ferramentas atualizadas

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Capacitor 8+ requer Node 22+ ou superior
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Sync Capacitor iOS
        run: npx cap sync ios --verbose

      - name: Build Xcode Project (Unsigned for Simulator)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     clean build
        shell: bash
