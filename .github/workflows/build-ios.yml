name: Build iOS App

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Permite rodar manualmente a partir do GitHub

jobs:
  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-14 # Usa o macOS com Xcode mais recente

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Set up CocoaPods Cache
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update
        shell: bash

      - name: Build Xcode Project (Unsigned for Simulator)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     clean build
        shell: bash
